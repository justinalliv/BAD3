name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create static output directory
        run: |
          mkdir -p site
          cp index.html site/
          cp *.html site/
          cp -r assets/ site/
          cp -r static/ site/
          cp -r css/ site/
          cp -r js/ site/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Uploading Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          upload-dir: site/

      - name: Deploy Pages
        uses: actions/deploy-pages@v5
